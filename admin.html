<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - موب قليوب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
:root {
  --primary:#1a56db;--accent:#f97316;--bg:#0a0f1e;--bg2:#111827;
  --card:#1f2937;--text:#f9fafb;--text2:#9ca3af;--border:#374151;
  --success:#10b981;--error:#ef4444;
}
body { font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh; }

/* Login */
.login-screen {
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.login-box {
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:40px;width:100%;max-width:400px;
  text-align:center;
}
.login-icon { font-size:60px;margin-bottom:16px; }
.login-title { font-size:24px;font-weight:900;margin-bottom:8px; }
.login-sub { color:var(--text2);margin-bottom:28px; }
.login-input {
  width:100%;background:var(--bg2);border:1px solid var(--border);
  color:var(--text);padding:14px 18px;border-radius:12px;
  font-family:'Cairo',sans-serif;font-size:16px;outline:none;
  margin-bottom:16px;transition:border-color 0.2s;text-align:center;
  letter-spacing:2px;
}
.login-input:focus { border-color:var(--primary); }
.login-btn {
  width:100%;background:var(--primary);color:white;border:none;
  padding:14px;border-radius:12px;font-family:'Cairo',sans-serif;
  font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;
}
.login-btn:hover { background:#1343b0; }
.login-error { color:var(--error);font-size:14px;margin-top:10px; }

/* Blocked */
.blocked-screen {
  display:none;align-items:center;justify-content:center;
  min-height:100vh;text-align:center;flex-direction:column;gap:20px;
}
.blocked-icon { font-size:80px; }
.blocked-title { font-size:32px;font-weight:900;color:var(--error); }

/* Admin Panel */
.admin-panel { display:none; }

.admin-header {
  background:var(--bg2);padding:16px 24px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.admin-brand { font-size:20px;font-weight:900;color:var(--accent); }
.back-btn {
  background:var(--border);color:var(--text);border:none;
  padding:8px 18px;border-radius:8px;font-family:'Cairo',sans-serif;
  font-size:14px;cursor:pointer;text-decoration:none;display:inline-block;
}

.admin-body { max-width:1100px;margin:0 auto;padding:30px 20px; }

.stats-grid {
  display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:16px;margin-bottom:30px;
}
.stat-card {
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:20px;text-align:center;
}
.stat-num { font-size:36px;font-weight:900;color:var(--accent); }
.stat-label { font-size:13px;color:var(--text2);margin-top:4px; }

.tabs { display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap; }
.tab {
  padding:10px 22px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text2);cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;
  transition:all 0.2s;
}
.tab.active { background:var(--primary);border-color:var(--primary);color:white; }

.listings-grid { display:grid;gap:14px; }

.admin-listing-card {
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:18px;
  display:flex;gap:16px;align-items:flex-start;
  transition:border-color 0.2s;
}
.admin-listing-card:hover { border-color:var(--primary); }

.admin-listing-img {
  width:90px;height:90px;object-fit:cover;
  border-radius:10px;flex-shrink:0;
}

.card-info { flex:1; }
.card-name { font-size:16px;font-weight:700;margin-bottom:4px; }
.card-meta { font-size:13px;color:var(--text2);margin-bottom:6px;line-height:1.6; }
.card-desc { font-size:13px;color:var(--text2);margin-bottom:10px; }

.card-actions { display:flex;gap:8px;flex-wrap:wrap; }
.btn-approve {
  background:var(--success);color:white;border:none;
  padding:8px 18px;border-radius:8px;font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;
}
.btn-approve:hover { opacity:0.9;transform:translateY(-1px); }
.btn-reject {
  background:var(--error);color:white;border:none;
  padding:8px 18px;border-radius:8px;font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;
}
.btn-reject:hover { opacity:0.9;transform:translateY(-1px); }
.btn-view {
  background:var(--border);color:var(--text);border:none;
  padding:8px 18px;border-radius:8px;font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
}

.badge {
  display:inline-block;padding:3px 12px;border-radius:20px;
  font-size:12px;font-weight:700;margin-right:6px;
}
.badge.pending { background:rgba(249,115,22,0.15);color:var(--accent); }
.badge.approved { background:rgba(16,185,129,0.15);color:var(--success); }
.badge.rejected { background:rgba(239,68,68,0.15);color:var(--error); }

.loading { text-align:center;padding:60px;color:var(--text2); }
.spinner {
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }

.empty { text-align:center;padding:60px;color:var(--text2); }
.empty-icon { font-size:48px;margin-bottom:12px; }

/* Notification */
.notif {
  position:fixed;bottom:24px;right:24px;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 20px;
  font-size:14px;font-weight:700;z-index:9999;
  transform:translateX(200%);transition:transform 0.3s;
  max-width:300px;
}
.notif.show { transform:translateX(0); }
.notif.success { border-color:var(--success);color:var(--success); }
.notif.error { border-color:var(--error);color:var(--error); }

/* Images modal */
.imgs-modal {
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.9);z-index:9999;align-items:center;justify-content:center;
  flex-wrap:wrap;gap:10px;padding:20px;
}
.imgs-modal.show { display:flex; }
.imgs-modal img {
  max-width:45%;max-height:45vh;object-fit:contain;border-radius:8px;
}
.imgs-modal-close {
  position:fixed;top:20px;left:20px;background:var(--error);color:white;
  border:none;width:40px;height:40px;border-radius:50%;font-size:18px;
  cursor:pointer;z-index:10000;
}
</style>
</head>
<body>

<!-- شاشة لوحين -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h1 class="login-title">لوحة التحكم</h1>
    <p class="login-sub">موب قليوب - أدخل كلمة السر</p>
    <input type="password" class="login-input" id="adminPassInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter') checkAdminPass()">
    <button class="login-btn" onclick="checkAdminPass()">دخول 🔑</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- شاشة بلوك -->
<div class="blocked-screen" id="blockedScreen">
  <div class="blocked-icon">🚫</div>
  <h1 class="blocked-title">تم حظرك!</h1>
  <p style="color:#9ca3af">حاولت تدخل بكلمة سر غلط</p>
  <p style="color:#9ca3af;font-size:13px">تواصل مع المطور لرفع الحظر</p>
</div>

<!-- لوحة التحكم -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <div class="admin-brand">🔧 لوحة تحكم موب قليوب</div>
    <a href="/" class="back-btn">← الموقع الرئيسي</a>
  </div>
  
  <div class="admin-body">
    <!-- إحصائيات -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">-</div>
        <div class="stat-label">إجمالي الإعلانات</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statPending">-</div>
        <div class="stat-label">قيد المراجعة</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statApproved">-</div>
        <div class="stat-label">معتمدة</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statUsers">-</div>
        <div class="stat-label">المستخدمين</div>
      </div>
    </div>

    <!-- تابات -->
    <div class="tabs">
      <button class="tab active" onclick="loadTab('pending', this)">⏳ قيد المراجعة</button>
      <button class="tab" onclick="loadTab('approved', this)">✅ معتمدة</button>
      <button class="tab" onclick="loadTab('rejected', this)">❌ مرفوضة</button>
      <button class="tab" onclick="loadTab('all', this)">📋 الكل</button>
    </div>

    <!-- إعلانات -->
    <div class="listings-grid" id="adminListings">
      <div class="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    </div>
  </div>
</div>

<!-- صور مودال -->
<div class="imgs-modal" id="imgsModal">
  <button class="imgs-modal-close" onclick="document.getElementById('imgsModal').classList.remove('show')">✕</button>
</div>

<!-- نوتيفيكيشن -->
<div class="notif" id="adminNotif"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrKts7fDedMnzbPzVyFotwHcDwXledXR4",
  authDomain: "mobqalyub.firebaseapp.com",
  projectId: "mobqalyub",
  storageBucket: "mobqalyub.firebasestorage.app",
  messagingSenderId: "262843778455",
  appId: "1:262843778455:web:9c011310846d78eb78b0d2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASS = "@#$%&*-+()19399";

// Check if blocked
window.checkAdminPass = function() {
  const pass = document.getElementById('adminPassInput').value;
  
  if (pass !== ADMIN_PASS) {
    // Block immediately
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('blockedScreen').style.display = 'flex';
    localStorage.setItem('adminBlocked', 'true');
    return;
  }

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadStats();
  loadListings('pending');
};

// Check blocked on load
if (localStorage.getItem('adminBlocked') === 'true') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('blockedScreen').style.display = 'flex';
}

// Stats
async function loadStats() {
  try {
    const allSnap = await getDocs(collection(db, 'listings'));
    const usersSnap = await getDocs(collection(db, 'users'));
    
    let pending = 0, approved = 0;
    allSnap.forEach(d => {
      const data = d.data();
      if (data.status === 'pending') pending++;
      if (data.status === 'approved') approved++;
    });

    document.getElementById('statTotal').textContent = allSnap.size;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statApproved').textContent = approved;
    document.getElementById('statUsers').textContent = usersSnap.size;
  } catch(e) { console.error(e); }
}

// Load listings
window.loadTab = function(status, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadListings(status);
};

async function loadListings(status) {
  const container = document.getElementById('adminListings');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>';

  try {
    let q;
    if (status === 'all') {
      q = query(collection(db, 'listings'), orderBy('createdAt', 'desc'));
    } else {
      q = query(collection(db, 'listings'), where('status', '==', status), orderBy('createdAt', 'desc'));
    }

    const snap = await getDocs(q);
    const listings = [];
    snap.forEach(d => listings.push({ id: d.id, ...d.data() }));

    if (listings.length === 0) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>مفيش إعلانات هنا</p></div>';
      return;
    }

    container.innerHTML = listings.map(l => `
      <div class="admin-listing-card" id="card-${l.id}">
        <img class="admin-listing-img" src="${l.images?.[0] || ''}" alt="${l.name}" onerror="this.style.display='none'">
        <div class="card-info">
          <div class="card-name">
            ${l.name}
            <span class="badge ${l.status}">${l.status === 'pending' ? '⏳ قيد المراجعة' : l.status === 'approved' ? '✅ معتمد' : '❌ مرفوض'}</span>
          </div>
          <div class="card-meta">
            💰 ${l.price?.toLocaleString()} ج &nbsp;|&nbsp; 📍 ${l.area} &nbsp;|&nbsp; 📱 ${l.brand} &nbsp;|&nbsp; 🏷️ ${l.condition}
            <br>👤 ${l.sellerName || 'غير معروف'}
          </div>
          <div class="card-desc">${l.desc || '-'}</div>
          <div class="card-actions">
            ${l.status !== 'approved' ? `<button class="btn-approve" onclick="approveL('${l.id}')">✅ اعتماد</button>` : ''}
            ${l.status !== 'rejected' ? `<button class="btn-reject" onclick="rejectL('${l.id}')">❌ رفض</button>` : ''}
            ${l.images?.length > 0 ? `<button class="btn-view" onclick="viewImgs(${JSON.stringify(l.images).replace(/"/g, '&quot;')})">🖼️ الصور (${l.images.length})</button>` : ''}
          </div>
        </div>
      </div>
    `).join('');

  } catch(e) {
    container.innerHTML = '<div class="empty"><p style="color:#ef4444">حصل خطأ في التحميل</p></div>';
    console.error(e);
  }
}

// Approve
window.approveL = async function(id) {
  try {
    await updateDoc(doc(db, 'listings', id), { status: 'approved' });
    document.getElementById(`card-${id}`).style.opacity = '0.5';
    showNotif('✅ تم اعتماد الإعلان', 'success');
    loadStats();
  } catch(e) { showNotif('حصل خطأ!', 'error'); }
};

// Reject
window.rejectL = async function(id) {
  try {
    await updateDoc(doc(db, 'listings', id), { status: 'rejected' });
    document.getElementById(`card-${id}`).style.opacity = '0.5';
    showNotif('❌ تم رفض الإعلان', 'error');
    loadStats();
  } catch(e) { showNotif('حصل خطأ!', 'error'); }
};

// View images
window.viewImgs = function(imgs) {
  const modal = document.getElementById('imgsModal');
  modal.innerHTML = `
    <button class="imgs-modal-close" onclick="document.getElementById('imgsModal').classList.remove('show')">✕</button>
    ${imgs.map(img => `<img src="${img}" alt="صورة">`).join('')}
  `;
  modal.classList.add('show');
};

function showNotif(msg, type) {
  const el = document.getElementById('adminNotif');
  el.textContent = msg;
  el.className = `notif ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Auto refresh every 30 sec
setInterval(() => {
  if (document.getElementById('adminPanel').style.display === 'block') {
    loadStats();
  }
}, 30000);
</script>
</body>
</html>
