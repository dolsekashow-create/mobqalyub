<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - موب قليوب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a56db;--primary-dark:#1343b0;--accent:#f97316;
  --bg:#0a0f1e;--bg2:#111827;--card:#1f2937;--card2:#243044;
  --text:#f9fafb;--text2:#9ca3af;--border:#374151;
  --success:#10b981;--error:#ef4444;--warning:#f59e0b;--info:#3b82f6;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 30% 50%,rgba(26,86,219,0.15),transparent 60%)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.4)}
.login-logo{font-size:56px;margin-bottom:8px}
.login-brand{font-size:26px;font-weight:900;color:var(--accent);margin-bottom:4px}
.login-sub{color:var(--text2);margin-bottom:32px;font-size:14px}
.login-input{width:100%;background:var(--bg2);border:2px solid var(--border);color:var(--text);padding:16px 20px;border-radius:14px;font-family:'Cairo',sans-serif;font-size:18px;outline:none;margin-bottom:16px;transition:border-color 0.2s;text-align:center;letter-spacing:3px}
.login-input:focus{border-color:var(--primary)}
.login-btn{width:100%;background:var(--primary);color:white;border:none;padding:16px;border-radius:14px;font-family:'Cairo',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.2s}
.login-btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
.login-error{color:var(--error);font-size:14px;margin-top:10px;min-height:20px}
.blocked-screen{display:none;align-items:center;justify-content:center;min-height:100vh;text-align:center;flex-direction:column;gap:16px}
.admin-wrap{display:none;min-height:100vh}
.sidebar{position:fixed;right:0;top:0;width:260px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform 0.3s}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo-text{font-size:18px;font-weight:900;color:var(--accent)}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;cursor:pointer;transition:all 0.2s;margin-bottom:4px;color:var(--text2);font-size:15px;font-weight:600;border:none;background:none;width:100%;text-align:right}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(26,86,219,0.15);color:var(--primary);border:1px solid rgba(26,86,219,0.3)}
.nav-icon{font-size:18px;width:24px;text-align:center}
.nav-badge{margin-right:auto;background:var(--error);color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.admin-info{display:flex;align-items:center;gap:10px}
.admin-avatar{width:40px;height:40px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.admin-name{font-size:14px;font-weight:700}
.admin-role{font-size:12px;color:var(--accent)}
.main-content{margin-right:260px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:20px;font-weight:900}
.topbar-actions{display:flex;align-items:center;gap:12px}
.refresh-btn{background:var(--card);color:var(--text2);border:1px solid var(--border);padding:8px 16px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s}
.refresh-btn:hover{color:var(--text);border-color:var(--primary)}
.back-link{background:var(--primary);color:white;text-decoration:none;padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700}
.content-area{padding:28px;flex:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;align-items:center;gap:16px;transition:all 0.2s;cursor:pointer}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2);border-color:var(--primary)}
.stat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.stat-icon.blue{background:rgba(26,86,219,0.15)}
.stat-icon.orange{background:rgba(249,115,22,0.15)}
.stat-icon.green{background:rgba(16,185,129,0.15)}
.stat-icon.red{background:rgba(239,68,68,0.15)}
.stat-icon.purple{background:rgba(139,92,246,0.15)}
.stat-num{font-size:28px;font-weight:900}
.stat-label{font-size:13px;color:var(--text2);margin-top:2px}
.stat-warn{font-size:12px;color:var(--warning);margin-top:4px}
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
.widget{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.widget-title{font-size:15px;font-weight:700;margin-bottom:16px}
.activity-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.activity-dot.green{background:var(--success)}
.activity-dot.orange{background:var(--accent)}
.activity-dot.red{background:var(--error)}
.activity-text{font-size:13px;flex:1}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quick-btn{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text2)}
.quick-btn:hover{border-color:var(--primary);color:var(--primary);background:rgba(26,86,219,0.05)}
.quick-btn-icon{font-size:24px;margin-bottom:6px}
.quick-btn-text{font-size:13px;font-weight:700}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.section-title{font-size:18px;font-weight:900}
.search-bar-admin{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-bar-admin input{background:none;border:none;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;flex:1}
.search-bar-admin input::placeholder{color:var(--text2)}
.listings-list{display:grid;gap:12px}
.admin-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;gap:14px;transition:all 0.2s}
.admin-card:hover{border-color:var(--primary);background:var(--card2)}
.admin-card-img{width:85px;height:85px;object-fit:cover;border-radius:10px;flex-shrink:0;background:var(--bg2)}
.card-body{flex:1;min-width:0}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.card-name{font-size:15px;font-weight:700}
.card-price{font-size:18px;font-weight:900;color:var(--accent);white-space:nowrap}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge.pending{background:rgba(249,115,22,0.15);color:var(--accent)}
.badge.approved{background:rgba(16,185,129,0.15);color:var(--success)}
.badge.rejected{background:rgba(239,68,68,0.15);color:var(--error)}
.badge.cond{background:rgba(59,130,246,0.15);color:var(--info)}
.card-meta{font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.8}
.card-phone{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;color:var(--success);margin-bottom:8px;display:inline-block}
.card-desc{font-size:12px;color:var(--text2);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-approve{background:var(--success);color:white;border:none;padding:7px 16px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-approve:hover{opacity:0.85;transform:translateY(-1px)}
.btn-reject{background:var(--error);color:white;border:none;padding:7px 16px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-reject:hover{opacity:0.85;transform:translateY(-1px)}
.btn-imgs{background:var(--border);color:var(--text);border:none;padding:7px 14px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-imgs:hover{background:var(--card2)}
.users-table{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.table-header{display:grid;grid-template-columns:1fr 1fr 130px 80px;gap:16px;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text2)}
.table-row{display:grid;grid-template-columns:1fr 1fr 130px 80px;gap:16px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:background 0.2s;font-size:13px}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:var(--card2)}
.user-cell{display:flex;align-items:center;gap:8px;font-weight:700}
.user-av{width:32px;height:32px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.user-email{color:var(--text2);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-date{color:var(--text2);font-size:12px}
.user-ads-badge{background:rgba(26,86,219,0.15);color:var(--primary);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;text-align:center;display:inline-block}
.loading{text-align:center;padding:60px;color:var(--text2)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
.notif{position:fixed;bottom:24px;left:24px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:14px;font-weight:700;z-index:9999;transform:translateX(-200%);transition:transform 0.3s;max-width:300px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
.notif.show{transform:translateX(0)}
.notif.success{border-color:var(--success);color:var(--success)}
.notif.error{border-color:var(--error);color:var(--error)}
.notif.info{border-color:var(--primary);color:var(--primary)}
.imgs-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center;flex-wrap:wrap;gap:12px;padding:24px}
.imgs-modal.show{display:flex}
.imgs-modal img{max-width:45%;max-height:45vh;object-fit:contain;border-radius:10px}
.imgs-close{position:fixed;top:20px;left:20px;background:var(--error);color:white;border:none;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;z-index:10000}
.menu-btn{display:none;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:10px;cursor:pointer;font-size:18px}
@media(max-width:768px){
  .sidebar{transform:translateX(100%);width:100%}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-right:0}
  .topbar{padding:12px 16px}
  .content-area{padding:16px}
  .overview-grid{grid-template-columns:1fr}
  .table-header,.table-row{grid-template-columns:1fr 1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .menu-btn{display:block}
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <div class="login-brand">موب قليوب</div>
    <p class="login-sub">لوحة تحكم المشرف</p>
    <input type="password" class="login-input" id="adminPassInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter')checkPass()">
    <button class="login-btn" onclick="checkPass()">دخول 🔑</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="blocked-screen" id="blockedScreen">
  <div style="font-size:80px">🚫</div>
  <h1 style="font-size:28px;font-weight:900;color:var(--error)">تم حظرك!</h1>
  <p style="color:var(--text2)">محاولة دخول غير مصرح بها</p>
  <p style="color:var(--text2);font-size:13px">امسح بيانات المتصفح لإعادة المحاولة</p>
</div>

<div class="admin-wrap" id="adminWrap">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span style="font-size:28px">📱</span>
      <div class="sidebar-logo-text">موب قليوب</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showPage('overview',this)"><span class="nav-icon">🏠</span>الرئيسية</button>
      <button class="nav-item" onclick="showPage('pending',this)"><span class="nav-icon">⏳</span>قيد المراجعة<span class="nav-badge" id="pendingBadge" style="display:none">0</span></button>
      <button class="nav-item" onclick="showPage('approved',this)"><span class="nav-icon">✅</span>الإعلانات المعتمدة</button>
      <button class="nav-item" onclick="showPage('rejected',this)"><span class="nav-icon">❌</span>الإعلانات المرفوضة</button>
      <button class="nav-item" onclick="showPage('all',this)"><span class="nav-icon">📋</span>كل الإعلانات</button>
      <button class="nav-item" onclick="showPage('users',this)"><span class="nav-icon">👥</span>المستخدمين</button>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar">👑</div>
        <div><div class="admin-name">المشرف</div><div class="admin-role">Admin</div></div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div class="page-title" id="pageTitle">الرئيسية</div>
      </div>
      <div class="topbar-actions">
        <button class="refresh-btn" onclick="refreshPage()">🔄 تحديث</button>
        <a href="/" class="back-link">← الموقع</a>
      </div>
    </div>
    <div class="content-area" id="contentArea">
      <div class="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    </div>
  </main>
</div>

<div class="imgs-modal" id="imgsModal">
  <button class="imgs-close" onclick="document.getElementById('imgsModal').classList.remove('show')">✕</button>
</div>
<div class="notif" id="notif"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrKts7fDedMnzbPzVyFotwHcDwXledXR4",
  authDomain: "mobqalyub.firebaseapp.com",
  projectId: "mobqalyub",
  storageBucket: "mobqalyub.firebasestorage.app",
  messagingSenderId: "262843778455",
  appId: "1:262843778455:web:9c011310846d78eb78b0d2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const PASS = "@#$%&*-+()19399";
let data = { listings: [], users: [] };
let curPage = 'overview';

if (localStorage.getItem('adminBlocked') === 'true') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('blockedScreen').style.display = 'flex';
}

window.checkPass = function() {
  if (document.getElementById('adminPassInput').value !== PASS) {
    localStorage.setItem('adminBlocked', 'true');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('blockedScreen').style.display = 'flex';
    return;
  }
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'flex';
  init();
};

async function init() {
  await loadData();
  showPage('overview', document.querySelector('.nav-item'));
}

async function loadData() {
  try {
    const [lSnap, uSnap] = await Promise.all([
      getDocs(query(collection(db, 'listings'), orderBy('createdAt', 'desc'))),
      getDocs(query(collection(db, 'users'), orderBy('createdAt', 'desc')))
    ]);
    data.listings = lSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    data.users = uSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const p = data.listings.filter(l => l.status === 'pending').length;
    const badge = document.getElementById('pendingBadge');
    badge.textContent = p;
    badge.style.display = p > 0 ? 'inline-block' : 'none';
  } catch(e) { console.error(e); }
}

window.showPage = function(page, btn) {
  curPage = page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const titles = {overview:'الرئيسية',pending:'قيد المراجعة',approved:'المعتمدة',rejected:'المرفوضة',all:'كل الإعلانات',users:'المستخدمين'};
  document.getElementById('pageTitle').textContent = titles[page] || '';
  document.getElementById('sidebar').classList.remove('open');
  if (page === 'overview') renderOverview();
  else if (page === 'users') renderUsers();
  else renderListings(page);
};

window.refreshPage = async function() {
  notify('🔄 جاري التحديث...', 'info');
  await loadData();
  showPage(curPage, null);
  notify('✅ تم التحديث', 'success');
};

function renderOverview() {
  const total = data.listings.length;
  const pending = data.listings.filter(l => l.status === 'pending').length;
  const approved = data.listings.filter(l => l.status === 'approved').length;
  const rejected = data.listings.filter(l => l.status === 'rejected').length;
  const users = data.users.length;
  const recent = data.listings.slice(0, 6);

  document.getElementById('contentArea').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" onclick="showPage('all',document.querySelectorAll('.nav-item')[4])">
        <div class="stat-icon blue">📋</div>
        <div><div class="stat-num">${total}</div><div class="stat-label">إجمالي الإعلانات</div></div>
      </div>
      <div class="stat-card" onclick="showPage('pending',document.querySelectorAll('.nav-item')[1])">
        <div class="stat-icon orange">⏳</div>
        <div><div class="stat-num">${pending}</div><div class="stat-label">قيد المراجعة</div>${pending>0?'<div class="stat-warn">⚠️ تحتاج مراجعة</div>':''}</div>
      </div>
      <div class="stat-card" onclick="showPage('approved',document.querySelectorAll('.nav-item')[2])">
        <div class="stat-icon green">✅</div>
        <div><div class="stat-num">${approved}</div><div class="stat-label">معتمدة</div></div>
      </div>
      <div class="stat-card" onclick="showPage('rejected',document.querySelectorAll('.nav-item')[3])">
        <div class="stat-icon red">❌</div>
        <div><div class="stat-num">${rejected}</div><div class="stat-label">مرفوضة</div></div>
      </div>
      <div class="stat-card" onclick="showPage('users',document.querySelectorAll('.nav-item')[5])">
        <div class="stat-icon purple">👥</div>
        <div><div class="stat-num">${users}</div><div class="stat-label">المستخدمين</div></div>
      </div>
    </div>
    <div class="overview-grid">
      <div class="widget">
        <div class="widget-title">⚡ أحدث النشاطات</div>
        ${recent.length === 0 ? '<p style="color:var(--text2);font-size:13px">لا يوجد نشاط</p>' :
          recent.map(l => `
            <div class="activity-item">
              <div class="activity-dot ${l.status==='approved'?'green':l.status==='rejected'?'red':'orange'}"></div>
              <div class="activity-text"><strong>${l.name}</strong> — ${l.sellerName||'مجهول'}</div>
              <span class="badge ${l.status}">${l.status==='pending'?'انتظار':l.status==='approved'?'معتمد':'مرفوض'}</span>
            </div>`).join('')}
      </div>
      <div class="widget">
        <div class="widget-title">🚀 إجراءات سريعة</div>
        <div class="quick-actions">
          <div class="quick-btn" onclick="showPage('pending',document.querySelectorAll('.nav-item')[1])">
            <div class="quick-btn-icon">⏳</div><div class="quick-btn-text">راجع الإعلانات</div>
          </div>
          <div class="quick-btn" onclick="showPage('users',document.querySelectorAll('.nav-item')[5])">
            <div class="quick-btn-icon">👥</div><div class="quick-btn-text">المستخدمين</div>
          </div>
          <div class="quick-btn" onclick="showPage('all',document.querySelectorAll('.nav-item')[4])">
            <div class="quick-btn-icon">📋</div><div class="quick-btn-text">كل الإعلانات</div>
          </div>
          <div class="quick-btn" onclick="window.open('/','_blank')">
            <div class="quick-btn-icon">🌐</div><div class="quick-btn-text">افتح الموقع</div>
          </div>
        </div>
      </div>
    </div>`;
}

function renderListings(status) {
  let list = status === 'all' ? data.listings : data.listings.filter(l => l.status === status);
  document.getElementById('contentArea').innerHTML = `
    <div class="search-bar-admin"><span>🔍</span><input type="text" placeholder="ابحث..." id="lSearch" oninput="filterL('${status}')"></div>
    <div class="section-header"><div class="section-title">${list.length} إعلان</div></div>
    <div class="listings-list" id="lList">${list.length===0?emptyHTML():list.map(cardHTML).join('')}</div>`;
}

window.filterL = function(status) {
  const q = document.getElementById('lSearch')?.value?.toLowerCase()||'';
  let list = status==='all'?data.listings:data.listings.filter(l=>l.status===status);
  if(q) list = list.filter(l=>l.name?.toLowerCase().includes(q)||l.area?.toLowerCase().includes(q)||l.sellerName?.toLowerCase().includes(q)||l.sellerPhone?.includes(q));
  document.getElementById('lList').innerHTML = list.length===0?emptyHTML():list.map(cardHTML).join('');
};

function cardHTML(l) {
  return `<div class="admin-card" id="card-${l.id}">
    <img class="admin-card-img" src="${l.images?.[0]||''}" alt="" onerror="this.style.display='none'">
    <div class="card-body">
      <div class="card-top"><div class="card-name">${l.name}</div><div class="card-price">${l.price?.toLocaleString()} ج</div></div>
      <div class="card-badges">
        <span class="badge ${l.status}">${l.status==='pending'?'⏳ انتظار':l.status==='approved'?'✅ معتمد':'❌ مرفوض'}</span>
        <span class="badge cond">${l.condition||''}</span>
      </div>
      <div class="card-meta">📍 ${l.area||'-'} &nbsp;|&nbsp; 📱 ${l.brand||'-'} &nbsp;|&nbsp; 👤 ${l.sellerName||'غير معروف'}</div>
      ${l.sellerPhone?`<div class="card-phone">📞 رقم البايع: ${l.sellerPhone}</div>`:'<div style="font-size:12px;color:var(--error);margin-bottom:8px">⚠️ لم يكتب رقم</div>'}
      <div class="card-desc">${l.desc||'-'}</div>
      <div class="card-actions">
        ${l.status!=='approved'?`<button class="btn-approve" onclick="approveAd('${l.id}')">✅ اعتماد</button>`:''}
        ${l.status!=='rejected'?`<button class="btn-reject" onclick="rejectAd('${l.id}')">❌ رفض</button>`:''}
        ${l.images?.length?`<button class="btn-imgs" onclick="viewImgs(${JSON.stringify(l.images).replace(/"/g,'&quot;')})">🖼️ صور (${l.images.length})</button>`:''}
      </div>
    </div>
  </div>`;
}

function emptyHTML() { return '<div class="empty"><div class="empty-icon">📭</div><p>مفيش إعلانات هنا</p></div>'; }

function renderUsers() {
  const users = data.users;
  document.getElementById('contentArea').innerHTML = `
    <div class="search-bar-admin"><span>🔍</span><input type="text" placeholder="ابحث عن مستخدم..." id="uSearch" oninput="filterU()"></div>
    <div class="section-header"><div class="section-title">${users.length} مستخدم مسجل</div></div>
    <div class="users-table">
      <div class="table-header"><div>اسم المستخدم</div><div>الإيميل</div><div>تاريخ التسجيل</div><div>الإعلانات</div></div>
      <div id="uBody">${users.length===0?'<div class="empty"><p>لا يوجد مستخدمين</p></div>':users.map(userRowHTML).join('')}</div>
    </div>`;
}

window.filterU = function() {
  const q = document.getElementById('uSearch')?.value?.toLowerCase()||'';
  const list = q?data.users.filter(u=>u.username?.toLowerCase().includes(q)||u.email?.toLowerCase().includes(q)):data.users;
  document.getElementById('uBody').innerHTML = list.length===0?'<div class="empty"><p>مفيش نتايج</p></div>':list.map(userRowHTML).join('');
};

function userRowHTML(u) {
  const ads = data.listings.filter(l=>l.sellerUid===u.uid).length;
  const date = u.createdAt?.toDate?u.createdAt.toDate().toLocaleDateString('ar-EG'):'-';
  const init = (u.username||u.email||'?')[0].toUpperCase();
  return `<div class="table-row">
    <div class="user-cell"><div class="user-av">${init}</div><span>${u.username||'بدون اسم'}</span></div>
    <div class="user-email">${u.email||'-'}</div>
    <div class="user-date">${date}</div>
    <div><span class="user-ads-badge">${ads} إعلان</span></div>
  </div>`;
}

window.approveAd = async function(id) {
  try {
    await updateDoc(doc(db,'listings',id),{status:'approved'});
    const i = data.listings.findIndex(l=>l.id===id);
    if(i!==-1) data.listings[i].status='approved';
    document.getElementById(`card-${id}`)?.remove();
    notify('✅ تم اعتماد الإعلان','success');
    updateBadge();
  } catch(e){notify('حصل خطأ!','error');}
};

window.rejectAd = async function(id) {
  try {
    await updateDoc(doc(db,'listings',id),{status:'rejected'});
    const i = data.listings.findIndex(l=>l.id===id);
    if(i!==-1) data.listings[i].status='rejected';
    document.getElementById(`card-${id}`)?.remove();
    notify('❌ تم رفض الإعلان','error');
    updateBadge();
  } catch(e){notify('حصل خطأ!','error');}
};

function updateBadge() {
  const p = data.listings.filter(l=>l.status==='pending').length;
  const badge = document.getElementById('pendingBadge');
  badge.textContent = p;
  badge.style.display = p>0?'inline-block':'none';
}

window.viewImgs = function(imgs) {
  const modal = document.getElementById('imgsModal');
  modal.innerHTML = `<button class="imgs-close" onclick="document.getElementById('imgsModal').classList.remove('show')">✕</button>${imgs.map(img=>`<img src="${img}" alt="">`).join('')}`;
  modal.classList.add('show');
};

function notify(msg, type) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = `notif ${type} show`;
  setTimeout(()=>el.classList.remove('show'),3000);
}

setInterval(async()=>{
  if(document.getElementById('adminWrap').style.display==='flex'){
    await loadData();
    if(curPage==='overview') renderOverview();
  }
},60000);
</script>
</body>
</html>
